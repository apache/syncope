qr.title=Scan the QR code
qr.end=Scan the QR code and enter the generated OTP code to continue.
qr.body=Use one of apps supporting the TOTP protocol, such as <a href="https://freeotp.github.io/" target="blank">FreeOTP</a> or any proprietary or open source alternative, to scan the QR code below.  This will enable your Apache Syncope account for MFA.
recoveryCodes.about=Recovery codes are used to access your account in the event you have no access to the configured app. For security reasons, each code can be used only once.
recoveryCodes.title=Recovery codes
recoveryCodes.warning=Copy or print your recovery codes and keep them in a secure place.
incorrect.otp=Incorrect OTP
mfa.enroll.aborted=MFA enroll aborted
mfa.enroll.error=Could not enroll MFA
mfa.enroll.success=MFA enroll successfully completed
