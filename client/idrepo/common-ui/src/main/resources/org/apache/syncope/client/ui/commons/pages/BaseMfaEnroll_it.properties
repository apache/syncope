qr.title=Scansiona il codice QR
qr.end=Scansiona il codice QR e inserisci il codice OTP generato per proseguire.
qr.body=Utilizza una delle app che supportano il protocollo TOTP, come <a href="https://freeotp.github.io/" target="blank">FreeOTP</a> o qualsiasi alternativa proprietaria o open source, per scansionare il codice QR qui sotto. Questo abiliter\u00e0 l'autenticazione a pi\u00f9 fattori (MFA) per il tuo account Apache Syncope.
recoveryCodes.about=I codici di recupero servono per accedere al tuo account nel caso in cui non tu non abbia accesso all'app configurata. Per motivi di sicurezza, ogni codice pu\u00f2 essere utilizzato una sola volta.
recoveryCodes.title=Codici di recupero
recoveryCodes.warning=Copia o stampa i tuoi codici di recupero e conservali in un luogo sicuro.
incorrect.otp=OTP errato
mfa.enroll.aborted=Configurazione MFA annullata
mfa.enroll.error=Impossibile configurare MFA
mfa.enroll.success=Configurazione MFA completata
